name: Refresh public pricing catalog

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GCP_API_KEY: ${{ secrets.GCP_API_KEY }}
      AWS_REGIONS: ${{ vars.AWS_REGIONS }}
      AZURE_REGIONS: ${{ vars.AZURE_REGIONS }}
      GCP_REGIONS: ${{ vars.GCP_REGIONS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run catalog:sync
